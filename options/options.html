<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PoE Impact View — Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      background: #0c0c0e;
      color: #e8e6e3;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 20px;
      color: #af6025;
      margin-bottom: 16px;
      border-bottom: 2px solid #af6025;
      padding-bottom: 8px;
    }
    .section {
      margin-bottom: 20px;
      background: #1a1a1e;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 14px;
    }
    .section h2 {
      font-size: 14px;
      color: #8b8b9e;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 13px;
      color: #c0c0cc;
    }
    .field input, .field select {
      background: #0c0c0e;
      color: #e8e6e3;
      border: 1px solid #3a3a3e;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      min-width: 160px;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #af6025;
    }
    .btn-save {
      background: #af6025;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-save:hover { background: #c97030; }
    .btn-danger {
      background: #5a2020;
      color: #ff6666;
      border: 1px solid #883333;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-danger:hover { background: #6a2a2a; }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #66ff66;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>PoE Impact View — Options</h1>

  <div class="section">
    <h2>General</h2>
    <div class="field">
      <label for="league">League</label>
      <input type="text" id="league" placeholder="e.g. Settlers">
    </div>
    <div class="field">
      <label for="language">Language</label>
      <select id="language">
        <option value="en">English</option>
        <option value="cs">Čeština</option>
        <option value="zh">中文</option>
      </select>
    </div>
  </div>

  <div class="section">
    <h2>Overlay</h2>
    <div class="field">
      <label for="autoCalc">Auto-calculate on page load</label>
      <input type="checkbox" id="autoCalc" checked>
    </div>
  </div>

  <div class="section">
    <h2>Data</h2>
    <div class="field">
      <label>Clear cached prices and build data</label>
      <button class="btn-danger" id="btnClear">Clear Data</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-save" id="btnSave">Save</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    // Load saved options
    chrome.storage.local.get(['league', 'i18n_locale', 'autoCalc'], (data) => {
      if (data.league) $('#league').value = data.league;
      if (data.i18n_locale) $('#language').value = data.i18n_locale;
      if (data.autoCalc !== undefined) $('#autoCalc').checked = data.autoCalc;
    });

    // Save
    $('#btnSave').addEventListener('click', () => {
      chrome.storage.local.set({
        league: $('#league').value.trim(),
        i18n_locale: $('#language').value,
        autoCalc: $('#autoCalc').checked,
      }, () => {
        $('#status').textContent = 'Saved!';
        setTimeout(() => { $('#status').textContent = ''; }, 2000);
      });
    });

    // Clear data
    $('#btnClear').addEventListener('click', () => {
      if (!confirm('Clear all cached data?')) return;
      chrome.storage.local.clear(() => {
        $('#status').textContent = 'All data cleared.';
        setTimeout(() => { $('#status').textContent = ''; }, 2000);
      });
    });
  </script>
</body>
</html>
